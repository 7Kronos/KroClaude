# ==============================================================================
# KroClaude — Quick Start
#   docker compose up -d
#   docker exec -it kroclaude bash
# Authoritative env-var contract: specs/001-claude-shell-base/contracts/compose-environment.md
# ==============================================================================

services:
  kroclaude:
    build:
      context: .
    image: kroclaude:dev
    container_name: kroclaude
    hostname: kroclaude
    restart: unless-stopped
    shm_size: 4g

    # FR-003b: headless Chromium needs SYS_ADMIN + SYS_PTRACE for its
    # namespace/sandbox model. NOT a blanket privileged-mode shortcut.
    cap_add:
      - SYS_ADMIN # FR-003b — Chromium sandbox
      - SYS_PTRACE # FR-003b — Chromium debugger probes
      - NET_ADMIN # .NET Aspire DCP — manages local network state for the dashboard
    # FR-003b: relax seccomp for Chromium's syscall set on Bookworm.
    security_opt:
      - seccomp=unconfined # FR-003b — Chromium

    environment:
      # Required (no default — set in .env or Coolify secret).
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      # Optional runtime configuration.
      TZ: "${TZ:-UTC}"
      GIT_USER_NAME: "${GIT_USER_NAME:-}"
      GIT_USER_EMAIL: "${GIT_USER_EMAIL:-}"
      NODE_OPTIONS: "${NODE_OPTIONS:-}"
      # Optional notifications (Apprise URLs). Off unless the in-container
      # sentinel /home/claude/.claude/notify-on also exists.
      NOTIFY_URLS: "${NOTIFY_URLS:-}"
      # Optional — consumed by the bundled EXA MCP server fragment
      # (config/mcp-servers.d/exa.json).
      EXA_API_KEY: "${EXA_API_KEY:-}"
      # Optional — passed to the github MCP server (see entrypoint.sh).
      GITHUB_PERSONAL_ACCESS_TOKEN: "${GITHUB_PERSONAL_ACCESS_TOKEN:-}"
      # Optional — credentials for a private NuGet feed; propagated to
      # SSH login shells via /etc/environment so `dotnet restore` /
      # `dotnet nuget` pick them up.
      NUGET_REGISTRY_USER: "${NUGET_REGISTRY_USER:-}"
      NUGET_REGISTRY_TOKEN: "${NUGET_REGISTRY_TOKEN:-}"
      # Optional SSH access (feature 003-ssh-access). Verbatim contents
      # of ~claude/.ssh/authorized_keys; one or more public keys, one
      # per line. Empty = no login possible.
      KROCLAUDE_SSH_AUTHORIZED_KEY: "${KROCLAUDE_SSH_AUTHORIZED_KEY:-}"
      # In-container SSH port is fixed at 2221; this var configures the
      # HOST-side port override only.
      KROCLAUDE_SSH_HOST_PORT: "${KROCLAUDE_SSH_HOST_PORT:-2221}"
      # Talks to the dind sidecar (shared net namespace → localhost).
      # Daemon is isolated: `docker ps` inside this container only
      # sees children of the dind sidecar, never host containers.
      DOCKER_HOST: "tcp://localhost:2375"

    ports:
      # Feature 003 — SSH access. Host port overridable via env.
      - "${KROCLAUDE_SSH_HOST_PORT:-2221}:2221"

    volumes:
      - kroclaude-config:/home/claude/.claude
      - kroclaude-workspace:/workspace
      # Per-CLI auth volumes so `gh auth login`, `codex` and `gemini`
      # credentials survive Coolify redeploys (claude-code creds live
      # under ~/.claude and are already covered by kroclaude-config).
      - kroclaude-gh:/home/claude/.config/gh
      - kroclaude-codex:/home/claude/.codex
      - kroclaude-gemini:/home/claude/.gemini
      # VS Code Remote-SSH downloads its server binary and any installed
      # extensions into ~/.vscode-server on first connect. Persisting it
      # keeps that ~200 MB install + extension state across redeploys.
      - kroclaude-vscode:/home/claude/.vscode-server

  # Isolated Docker-in-Docker sidecar. Joins kroclaude's network
  # namespace so localhost-published ports (the Aspire/.NET pattern)
  # are directly reachable. The dind daemon's storage lives in a
  # dedicated named volume — images and containers persist across
  # redeploys, but are completely separate from the host's daemon.
  # `privileged: true` is on dind only; the kroclaude container itself
  # stays unprivileged.
  dind:
    image: docker:27-dind
    container_name: kroclaude-dind
    restart: unless-stopped
    privileged: true
    network_mode: "service:kroclaude"
    depends_on:
      - kroclaude
    environment:
      DOCKER_TLS_CERTDIR: ""
    volumes:
      - dind-data:/var/lib/docker

volumes:
  kroclaude-config:
  kroclaude-workspace:
  kroclaude-gh:
  kroclaude-codex:
  kroclaude-gemini:
  kroclaude-vscode:
  dind-data:
