name: CI

on:
  pull_request:
  push:
    branches: [main]
    tags: ['v*.*.*']

permissions:
  contents: read

jobs:
  build-and-smoke:
    name: Build + smoke test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Validate compose with default env
        run: docker compose --env-file /dev/null config

      - name: Validate compose with .env.example
        run: docker compose --env-file .env.example config

      - name: Smoke — US1 (spin up Claude shell)
        run: bash tests/smoke/test_us1.sh

      - name: Smoke — US2 (persistence across recreate / rebuild)
        run: bash tests/smoke/test_us2.sh

      - name: Smoke — US3 (notifications opt-in / silent-fail)
        run: bash tests/smoke/test_us3.sh

      - name: Smoke — US4 (SSH access)
        run: bash tests/smoke/test_us4.sh

      - name: Smoke — US6 (Config bundling — seven customization types)
        run: bash tests/smoke/test_us6.sh

      # Budget + history checks reuse the kroclaude:dev image already built
      # by the smokes — no rebuild.
      - name: Image size budget (≤10% drift)
        run: |
          size_bytes=$(docker image inspect kroclaude:dev --format '{{.Size}}')
          echo "Image size: $size_bytes bytes ($(numfmt --to=iec $size_bytes))"
          # Baseline tracking is a v0.1.0+ concern. Once we have a published
          # baseline, this step compares and fails on >10% drift.

      - name: No credentials in image layers (SC-005)
        run: |
          history=$(docker history --no-trunc --format '{{.CreatedBy}}' kroclaude:dev)
          if echo "$history" | grep -E 'ANTHROPIC_API_KEY=|NOTIFY_[A-Z_]+='; then
            echo "::error::Credential-shaped value found in image history"
            exit 1
          fi
          echo "no credential-shaped values in image history"

      - name: Dump container logs on failure
        if: failure()
        run: |
          docker compose logs --no-color > docker-compose.log || true
          docker ps -a > docker-ps.log || true
      - name: Upload failure artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: docker-logs-${{ github.run_id }}
          path: |
            docker-compose.log
            docker-ps.log

  bundled-skills-budget:
    name: Bundled skills budget (≤20 skills, ≤10 MB)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Count and size bundled skills
        run: |
          if [ ! -d config/skills ]; then
            echo "no config/skills/ directory — nothing to enforce"
            exit 0
          fi
          count=$(find config/skills -mindepth 1 -maxdepth 1 -type d | wc -l)
          size=$(du -sb config/skills/ | awk '{print $1}')
          echo "Bundled skills: $count directories, $size bytes"
          if [ "$count" -gt 20 ]; then
            echo "::error::bundled skills count $count exceeds budget of 20 (FR-005)"
            exit 1
          fi
          if [ "$size" -gt 10485760 ]; then
            echo "::error::bundled skills total size $size bytes exceeds 10 MB budget (FR-005)"
            exit 1
          fi
